- name: React Compiler Action
  uses: shubh73/react-compiler-action@v1.0.4
  with:
    token: ${{ github.token }}
    changed-files-only: true
    fail-on-error: false
    post-comment: true
    annotations: true
    annotation-level: warning
    compilation-mode: infer
    working-directory: .

    include-patterns: |
      apps/**/*.ts
      apps/**/*.tsx
      packages/**/*.ts
      packages/**/*.tsx

    exclude-patterns: |
      **/node_modules/**
      **/dist/**
      **/.turbo/**
      **/.next/**
      **/coverage/**
      **/*.d.ts
      **/*.test.*
      **/*.spec.*
      **/__tests__/**
      **/generated/**
